<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" aria-hidden="true">
	<defs>
				<linearGradient id="finGrad" x1="0" x2="1">
					<stop offset="0" stop-color="#2DD4BF" />
					<stop offset="0.6" stop-color="#14B8A6" />
					<stop offset="1" stop-color="#0D9488" />
				</linearGradient>
			<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
				<feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08" />
			</filter>
	</defs>

	<!-- Mark -->
	<g transform="translate(8,4)">
		<rect width="40" height="40" rx="10" fill="#fff" filter="url(#softShadow)" />
		<circle cx="20" cy="20" r="14" fill="url(#finGrad)" />
		<!-- rounded-top bars -->
		<rect x="12" y="18" width="4" height="12" rx="2" fill="#fff" />
		<rect x="18" y="14" width="4" height="16" rx="2" fill="#fff" />
		<rect x="24" y="10" width="4" height="20" rx="2" fill="#fff" />
	</g>

	<!-- Wordmark -->
	<g transform="translate(60,18)">
		<text x="0" y="6" font-family="Inter, Roboto, 'Segoe UI', Arial" font-size="18" font-weight="700" fill="#0f172a">FinSense</text>
		<text x="0" y="22" font-family="Inter, Roboto, 'Segoe UI', Arial" font-size="9" fill="#475569">Expense Pattern Analyzer</text>
	</g>
</svg>
